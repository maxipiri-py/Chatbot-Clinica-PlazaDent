services:
  jupyter:
    build: 
      context: .
    image: ingenieria-soluciones-ia-jupyter:local
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
      - ingenieria-ia-venv:/workspace/.venv
    working_dir: /workspace
    environment:
      - MPLCONFIGDIR=/tmp/matplotlib
      - WATCHPACK_POLLING=true
    # Asegúrate de tener el archivo .env creado en la carpeta raíz
    env_file:
      - .env

volumes:
  # El volumen nombrado protege el venv de conflictos de arquitectura Windows/Linux
  ingenieria-ia-venv: